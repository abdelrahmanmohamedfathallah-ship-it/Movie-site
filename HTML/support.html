<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

    <header>
        <div id="logo">
            <img src="../IMAGES/Logo.png" alt="logo">
        </div>
        <div id="Nav-bar">
            <a href="../HTML/index.html">Home</a>
            <a href="../HTML/Movies&shows.html">Movies & shows</a>
            <a href="../HTML/support.html" class="active">Support</a>
            <a href="../HTML/subscriptions.html">Subscriptions</a>
        </div>
        <div id="search-notfi-icons">
            <img src="../IMAGES/Icon.png" alt="search-icon">
            <img src="../IMAGES/Icon2.png" alt="Notification-icon">
        </div>
    </header>

    <main id="Land-page-support">

        <section id="welcome-form-divs">


            <div id="welcome-div">
                <h1>Welcome to our <br> support page!</h1>
                <p>We're here to help you with any problems you may be having with <br> our product.</p>
                <div>
                    <img src="../IMAGES/Sub Container.png" alt="movies-pic">
                </div>
                
            </div>


            <div id="form-div">
                <form id="form">
                    <div class="form-row">
                        <div class="w-50">
                        <h3>First Name</h3>
                        <input type="text" placeholder="Enter First Name">
                        </div>
    
                        <div class="w-50">
                        <h3>Last Name</h3>
                        <input type="text" placeholder="Enter Last Name">
                        </div>
                    </div>
    
                    <div class="form-row">
                        <div class="w-50">
                        <h3>Email</h3>
                        <input type="email" placeholder="Enter your Email">
                        </div>
                        <div class="w-50-special">
                            <h3>Phone Number</h3>
                            <div class="w-50-special-inside">
                                <div class="dropdown">
                                    <img src="../IMAGES/45905ff594ea81e4c2c6c594416c7c84aaa8808a.png" alt="country-pic" style="width: 40px;">
                                    <img id="arrow" src="../IMAGES/arrow.png" alt="arrowdown-icon">
                                </div>
                                <div class="input">
                                    <input type="tel" placeholder="Enter Phone Number">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div id="message-div">
                        <h3>Message</h3>
                        <textarea name="" id="" placeholder="Enter your Message"></textarea>
                    </div>
                    <div id="last-row-div">
                        <div class="tos">
                            <input type="checkbox" required class> 
                            <p>
                                I agree with Terms of Use and Privacy Policy
                            </p>
                        </div>
                        <button>Send Message</button>
                    </div>
                </form>
            </div>
        </section>

    </main>
    
</body>
</html>
